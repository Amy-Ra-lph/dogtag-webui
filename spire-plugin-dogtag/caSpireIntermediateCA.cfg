# Dogtag Certificate Profile: caSpireIntermediateCA
#
# Issues intermediate CA certificates for SPIRE servers.
# Designed for auto-approval with constrained CA capabilities.
#
# Import with:
#   ipa certprofile-import caSpireIntermediateCA \
#       --file=caSpireIntermediateCA.cfg \
#       --desc="SPIRE Intermediate CA" \
#       --store=true

desc=SPIRE Intermediate CA Certificate
visible=false
enable=true
enableBy=ipara

auth.instance_id=raCertAuth

# Input: PKCS#10 CSR
input.i1.class_id=certReqInputImpl
input.i1.name=Certificate Request Input

# Output: signed certificate
output.o1.class_id=certOutputImpl
output.o1.name=Certificate Output

# --- Policy set ---

# Subject name from CSR
policyset.serverCertSet.list=1,2,3,4,5,6,7,8
policyset.serverCertSet.1.constraint.class_id=subjectNameConstraintImpl
policyset.serverCertSet.1.constraint.name=Subject Name Constraint
policyset.serverCertSet.1.constraint.params.pattern=CN=.*
policyset.serverCertSet.1.constraint.params.accept=true
policyset.serverCertSet.1.default.class_id=userSubjectNameDefaultImpl
policyset.serverCertSet.1.default.name=Subject Name Default

# Validity: 30 days (allows SPIRE ca_ttl up to ~15 days with rotation margin)
policyset.serverCertSet.2.constraint.class_id=validityConstraintImpl
policyset.serverCertSet.2.constraint.name=Validity Constraint
policyset.serverCertSet.2.constraint.params.range=2592000
policyset.serverCertSet.2.constraint.params.notBeforeGracePeriod=0
policyset.serverCertSet.2.default.class_id=validityDefaultImpl
policyset.serverCertSet.2.default.name=Validity Default
policyset.serverCertSet.2.default.params.range=172800
policyset.serverCertSet.2.default.params.startTime=0

# Key usage: keyCertSign + cRLSign only (CA operations)
policyset.serverCertSet.3.constraint.class_id=keyUsageExtConstraintImpl
policyset.serverCertSet.3.constraint.name=Key Usage Constraint
policyset.serverCertSet.3.constraint.params.keyUsageCritical=true
policyset.serverCertSet.3.constraint.params.keyUsageKeyCertSign=true
policyset.serverCertSet.3.constraint.params.keyUsageCrlSign=true
policyset.serverCertSet.3.constraint.params.keyUsageDigitalSignature=false
policyset.serverCertSet.3.constraint.params.keyUsageNonRepudiation=false
policyset.serverCertSet.3.constraint.params.keyUsageKeyEncipherment=false
policyset.serverCertSet.3.constraint.params.keyUsageDataEncipherment=false
policyset.serverCertSet.3.constraint.params.keyUsageKeyAgreement=false
policyset.serverCertSet.3.constraint.params.keyUsageEncipherOnly=false
policyset.serverCertSet.3.constraint.params.keyUsageDecipherOnly=false
policyset.serverCertSet.3.default.class_id=keyUsageExtDefaultImpl
policyset.serverCertSet.3.default.name=Key Usage Default
policyset.serverCertSet.3.default.params.keyUsageCritical=true
policyset.serverCertSet.3.default.params.keyUsageKeyCertSign=true
policyset.serverCertSet.3.default.params.keyUsageCrlSign=true
policyset.serverCertSet.3.default.params.keyUsageDigitalSignature=false
policyset.serverCertSet.3.default.params.keyUsageNonRepudiation=false
policyset.serverCertSet.3.default.params.keyUsageKeyEncipherment=false
policyset.serverCertSet.3.default.params.keyUsageDataEncipherment=false
policyset.serverCertSet.3.default.params.keyUsageKeyAgreement=false
policyset.serverCertSet.3.default.params.keyUsageEncipherOnly=false
policyset.serverCertSet.3.default.params.keyUsageDecipherOnly=false

# Basic constraints: CA:TRUE, pathlen:1
# pathlen:1 allows SPIRE to mint its own server CA beneath this intermediate
policyset.serverCertSet.4.constraint.class_id=basicConstraintsExtConstraintImpl
policyset.serverCertSet.4.constraint.name=Basic Constraints Constraint
policyset.serverCertSet.4.constraint.params.basicConstraintsCritical=true
policyset.serverCertSet.4.constraint.params.basicConstraintsIsCA=true
policyset.serverCertSet.4.constraint.params.basicConstraintsMinPathLen=0
policyset.serverCertSet.4.constraint.params.basicConstraintsMaxPathLen=1
policyset.serverCertSet.4.default.class_id=basicConstraintsExtDefaultImpl
policyset.serverCertSet.4.default.name=Basic Constraints Default
policyset.serverCertSet.4.default.params.basicConstraintsCritical=true
policyset.serverCertSet.4.default.params.basicConstraintsIsCA=true
policyset.serverCertSet.4.default.params.basicConstraintsPathLen=1

# Authority key identifier
policyset.serverCertSet.5.constraint.class_id=noConstraintImpl
policyset.serverCertSet.5.constraint.name=No Constraint
policyset.serverCertSet.5.default.class_id=authorityKeyIdentifierExtDefaultImpl
policyset.serverCertSet.5.default.name=Authority Key Identifier Default

# Subject key identifier
policyset.serverCertSet.6.constraint.class_id=noConstraintImpl
policyset.serverCertSet.6.constraint.name=No Constraint
policyset.serverCertSet.6.default.class_id=subjectKeyIdentifierExtDefaultImpl
policyset.serverCertSet.6.default.name=Subject Key Identifier Default

# Signing algorithm
policyset.serverCertSet.7.constraint.class_id=signingAlgConstraintImpl
policyset.serverCertSet.7.constraint.name=Signing Algorithm Constraint
policyset.serverCertSet.7.constraint.params.signingAlgsAllowed=SHA256withRSA,SHA384withRSA,SHA512withRSA,SHA256withEC,SHA384withEC,SHA512withEC
policyset.serverCertSet.7.default.class_id=signingAlgDefaultImpl
policyset.serverCertSet.7.default.name=Signing Algorithm Default
policyset.serverCertSet.7.default.params.signingAlg=-

# Key constraint: RSA 2048+ or EC P-256+
policyset.serverCertSet.8.constraint.class_id=keyConstraintImpl
policyset.serverCertSet.8.constraint.name=Key Constraint
policyset.serverCertSet.8.constraint.params.keyType=-
policyset.serverCertSet.8.constraint.params.keyParameters=1024,2048,3072,4096,nistp256,nistp384,nistp521
policyset.serverCertSet.8.default.class_id=userKeyDefaultImpl
policyset.serverCertSet.8.default.name=Key Default
