---
- name: Install 389 Directory Server
  ansible.builtin.dnf:
    name:
      - 389-ds-base
    state: present

- name: Install Dogtag PKI CA
  ansible.builtin.dnf:
    name:
      - pki-ca
    state: present

- name: Check if DS instance exists
  ansible.builtin.stat:
    path: "/etc/dirsrv/slapd-{{ dogtag_instance_name }}"
  register: ds_instance

- name: Create DS instance
  ansible.builtin.command:
    cmd: >
      dscreate create-template /tmp/ds-setup.inf
  when: not ds_instance.stat.exists
  changed_when: true

- name: Configure DS instance template
  ansible.builtin.template:
    src: ds-setup.inf.j2
    dest: /tmp/ds-setup.inf
    mode: "0600"
  when: not ds_instance.stat.exists

- name: Install DS instance
  ansible.builtin.command:
    cmd: dscreate from-file /tmp/ds-setup.inf
  when: not ds_instance.stat.exists
  changed_when: true

- name: Start and enable Directory Server
  ansible.builtin.systemd:
    name: "dirsrv@{{ dogtag_instance_name }}"
    state: started
    enabled: true

- name: Check if PKI instance exists
  ansible.builtin.stat:
    path: "/var/lib/pki/{{ dogtag_instance_name }}"
  register: pki_instance

- name: Deploy PKI configuration
  ansible.builtin.template:
    src: ca.cfg.j2
    dest: /tmp/ca.cfg
    mode: "0600"
  when: not pki_instance.stat.exists

- name: Install PKI CA instance
  ansible.builtin.command:
    cmd: pkispawn -f /tmp/ca.cfg -s CA
  when: not pki_instance.stat.exists
  changed_when: true
  notify: restart pki-tomcatd

- name: Remove temporary config files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/ca.cfg
    - /tmp/ds-setup.inf

- name: Start and enable PKI server
  ansible.builtin.systemd:
    name: "pki-tomcatd@{{ dogtag_instance_name }}"
    state: started
    enabled: true

- name: Export admin cert to PEM
  ansible.builtin.shell: |
    mkdir -p "$(dirname {{ dogtag_admin_cert_pem }})"
    openssl pkcs12 -in {{ dogtag_admin_cert_path }} \
      -clcerts -nokeys -out {{ dogtag_admin_cert_pem }} \
      -passin pass:{{ dogtag_admin_password }}
    openssl pkcs12 -in {{ dogtag_admin_cert_path }} \
      -nocerts -nodes -out {{ dogtag_admin_key_pem }} \
      -passin pass:{{ dogtag_admin_password }}
    chmod 600 {{ dogtag_admin_cert_pem }} {{ dogtag_admin_key_pem }}
  args:
    creates: "{{ dogtag_admin_cert_pem }}"

- name: Open firewall for HTTPS
  ansible.posix.firewalld:
    port: "{{ dogtag_ca_https_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  ignore_errors: true
