---
- name: Validate required passwords are set
  ansible.builtin.assert:
    that:
      - dogtag_admin_password is defined
      - dogtag_admin_password | length > 0
      - dogtag_ds_password is defined
      - dogtag_ds_password | length > 0
    fail_msg: "dogtag_admin_password and dogtag_ds_password must be set (use ansible-vault)"

- name: Install 389 Directory Server
  ansible.builtin.dnf:
    name:
      - 389-ds-base
    state: present

- name: Install Dogtag PKI CA
  ansible.builtin.dnf:
    name:
      - pki-ca
    state: present

- name: Check if DS instance exists
  ansible.builtin.stat:
    path: "/etc/dirsrv/slapd-{{ dogtag_instance_name }}"
  register: ds_instance

- name: Create secure temp file for DS config
  ansible.builtin.tempfile:
    suffix: .inf
  register: ds_tmpfile
  when: not ds_instance.stat.exists

- name: Configure DS instance template
  ansible.builtin.template:
    src: ds-setup.inf.j2
    dest: "{{ ds_tmpfile.path }}"
    mode: "0600"
  when: not ds_instance.stat.exists
  no_log: true

- name: Install DS instance
  ansible.builtin.command:
    cmd: "dscreate from-file {{ ds_tmpfile.path }}"
  when: not ds_instance.stat.exists
  changed_when: true
  no_log: true

- name: Remove DS temp config
  ansible.builtin.file:
    path: "{{ ds_tmpfile.path }}"
    state: absent
  when: ds_tmpfile.path is defined

- name: Start and enable Directory Server
  ansible.builtin.systemd:
    name: "dirsrv@{{ dogtag_instance_name }}"
    state: started
    enabled: true

- name: Check if PKI instance exists
  ansible.builtin.stat:
    path: "/var/lib/pki/{{ dogtag_instance_name }}"
  register: pki_instance

- name: Create secure temp file for PKI config
  ansible.builtin.tempfile:
    suffix: .cfg
  register: pki_tmpfile
  when: not pki_instance.stat.exists

- name: Deploy PKI configuration
  ansible.builtin.template:
    src: ca.cfg.j2
    dest: "{{ pki_tmpfile.path }}"
    mode: "0600"
  when: not pki_instance.stat.exists
  no_log: true

- name: Install PKI CA instance
  ansible.builtin.command:
    cmd: "pkispawn -f {{ pki_tmpfile.path }} -s CA"
  when: not pki_instance.stat.exists
  changed_when: true
  no_log: true
  notify: restart pki-tomcatd

- name: Remove PKI temp config
  ansible.builtin.file:
    path: "{{ pki_tmpfile.path }}"
    state: absent
  when: pki_tmpfile.path is defined

- name: Start and enable PKI server
  ansible.builtin.systemd:
    name: "pki-tomcatd@{{ dogtag_instance_name }}"
    state: started
    enabled: true

- name: Create secure temp file for PKCS12 password
  ansible.builtin.tempfile:
    suffix: .pass
  register: pass_tmpfile

- name: Write PKCS12 password to temp file
  ansible.builtin.copy:
    content: "{{ dogtag_admin_password }}"
    dest: "{{ pass_tmpfile.path }}"
    mode: "0600"
  no_log: true

- name: Export admin cert to PEM
  ansible.builtin.shell: |
    mkdir -p "$(dirname {{ dogtag_admin_cert_pem }})"
    openssl pkcs12 -in {{ dogtag_admin_cert_path }} \
      -clcerts -nokeys -out {{ dogtag_admin_cert_pem }} \
      -passin file:{{ pass_tmpfile.path }}
    openssl pkcs12 -in {{ dogtag_admin_cert_path }} \
      -nocerts -nodes -out {{ dogtag_admin_key_pem }} \
      -passin file:{{ pass_tmpfile.path }}
    chmod 600 {{ dogtag_admin_cert_pem }} {{ dogtag_admin_key_pem }}
  args:
    creates: "{{ dogtag_admin_cert_pem }}"

- name: Remove password temp file
  ansible.builtin.file:
    path: "{{ pass_tmpfile.path }}"
    state: absent

- name: Open firewall for HTTPS
  ansible.posix.firewalld:
    port: "{{ dogtag_ca_https_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  failed_when: false
