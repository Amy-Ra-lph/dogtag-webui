all:
  children:
    pki_servers:
      hosts:
        pki1:
          ansible_host: 192.168.140.101
          ansible_user: deploy
          ansible_become: true
      vars:
        dogtag_ca_hostname: "{{ ansible_fqdn }}"
        dogtag_ca_https_port: 8443
        dogtag_ca_http_port: 8080
        dogtag_ds_port: 389
        # Passwords are in vault-encrypted group_vars — see README
        dogtag_security_domain: "Test Example Security Domain"
        dogtag_ca_subject: "CN=CA Signing Certificate,O=Test Example"

    webui_servers:
      hosts:
        pki1:
      vars:
        webui_container_image: "dogtag-webui:latest"
        webui_port: 8080
        webui_ca_target_url: "https://{{ dogtag_ca_hostname }}:{{ dogtag_ca_https_port }}"
