stages:
  - validate
  - test
  - build

default:
  image: node:18-alpine

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

install:
  stage: validate
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint:
  stage: validate
  needs: [install]
  script:
    - npx eslint .

typecheck:
  stage: validate
  needs: [install]
  script:
    - npx tsc --noEmit

test:
  stage: test
  needs: [install]
  script:
    - npx vitest run --reporter=verbose
  coverage: '/All files\s+\|\s+(\d+\.?\d*)\s/'

build:
  stage: build
  needs: [lint, typecheck, test]
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

container:
  stage: build
  needs: [build]
  image: quay.io/podman/stable:latest
  script:
    - podman build -t dogtag-webui .
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
