# Nginx reverse proxy configuration for Dogtag PKI WebUI
#
# Serves the built React SPA and proxies REST API requests
# to the Dogtag CA backend running on port 8443 (HTTPS).
#
# Usage:
#   1. Build the WebUI:  npm run build
#   2. Copy dist/ to your web root or adjust the root path below.
#   3. Include this config in your nginx.conf or sites-enabled/.

server {
    listen 443 ssl;
    server_name pki.example.com;

    # TLS configuration - adjust paths to your certificates
    ssl_certificate     /etc/pki/tls/certs/server.crt;
    ssl_certificate_key /etc/pki/tls/private/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Serve the built WebUI
    root /usr/share/dogtag-webui/dist;
    index index.html;

    # SPA fallback: serve index.html for all non-file requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Dogtag CA REST API
    location /ca/rest/ {
        proxy_pass https://localhost:8443;
        proxy_ssl_verify off;  # Accept Dogtag's self-signed cert
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: proxy other Dogtag subsystems (KRA, OCSP, TKS, TPS)
    # location /kra/rest/ {
    #     proxy_pass https://localhost:8443;
    #     proxy_ssl_verify off;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name pki.example.com;
    return 301 https://$host$request_uri;
}
