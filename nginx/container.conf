server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /rekor/api/v1/ {
        proxy_pass ${REKOR_URL}/api/v1/;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        limit_except GET POST {
            deny all;
        }
    }

    location /ca/rest/ {
        proxy_pass ${CA_TARGET_URL};
        proxy_ssl_verify off;
        proxy_ssl_certificate /etc/nginx/certs/agent.cert;
        proxy_ssl_certificate_key /etc/nginx/certs/agent.key;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
