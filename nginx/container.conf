server {
    listen 8080;
    server_name _;

    # When TLS is enabled, redirect HTTP to HTTPS
    if (-f /etc/nginx/certs/tls.crt) {
        return 301 https://$host:8443$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /rekor/api/v1/ {
        proxy_pass ${REKOR_URL}/api/v1/;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        limit_except GET POST {
            deny all;
        }
    }

    location /ca/rest/ {
        proxy_pass ${CA_TARGET_URL};
        proxy_ssl_verify off;
        proxy_ssl_certificate /etc/nginx/certs/agent.cert;
        proxy_ssl_certificate_key /etc/nginx/certs/agent.key;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /rekor/api/v1/ {
        proxy_pass ${REKOR_URL}/api/v1/;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        limit_except GET POST {
            deny all;
        }
    }

    location /ca/rest/ {
        proxy_pass ${CA_TARGET_URL};
        proxy_ssl_verify off;
        proxy_ssl_certificate /etc/nginx/certs/agent.cert;
        proxy_ssl_certificate_key /etc/nginx/certs/agent.key;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
